info:
  name: Obtener todas las ordenes por estado
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/api/orders/PENDING?page=1&limit=1
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
